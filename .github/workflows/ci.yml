name: LAIF CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: laif-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  governance:
    name: Governance checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Log Python version
        run: python3 --version

      - name: Run governance self-tests
        env:
          PYTHONHASHSEED: '0'
        run: python3 tests/test_governance.py

      - name: Validate governance config
        env:
          PYTHONHASHSEED: '0'
        run: python3 scripts/governance/check_governance_config.py

      - name: Check protected artifacts
        env:
          PYTHONHASHSEED: '0'
        run: python3 scripts/governance/check_protected_artifacts.py

      - name: Check semantic boundaries
        env:
          PYTHONHASHSEED: '0'
        run: python3 scripts/governance/check_semantic_boundaries.py

  validation:
    name: Validation harness
    needs: governance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Log Python version
        run: python3 --version

      - name: Run baseline validation
        env:
          PYTHONHASHSEED: '0'
        run: python3 validate.py

      - name: Run verified corpus validation
        env:
          PYTHONHASHSEED: '0'
        run: python3 validate.py --verified-corpus

      - name: Run evidence trace validation
        env:
          PYTHONHASHSEED: '0'
        run: python3 validate.py --check-evidence-traces

  adversarial:
    name: Adversarial tests
    needs: governance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Log Python version
        run: python3 --version

      - name: Run adversarial test suite
        env:
          PYTHONHASHSEED: '0'
        run: python3 test_adversarial.py

  real-world:
    name: Real-world assessment suite
    needs: governance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Log Python version
        run: python3 --version

      - name: Run real-world test suite
        env:
          PYTHONHASHSEED: '0'
        run: python3 test_real_world.py
